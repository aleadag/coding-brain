name = "issue-triage"
enabled = true
mode = "assisted"
cadence = "2h"

[source]
kind = "github_issues"
repo = "aleadag/codexctl"
query = "is:open label:codexctl-loop"
limit = 5

[triage]
mode = "deterministic"
skill = "loop-triage"
instructions = """
Review each source item and decide whether Codex should act.
Prefer report-only when requirements are unclear.
Escalate destructive, security-sensitive, or ambiguous work.
"""

[triage.allowed]
actions = ["ignore", "report", "submit", "escalate"]
worktree = ["none", "existing", "required", "auto"]
verifiers = ["cargo clippy --all-targets -- -D warnings", "cargo clippy --all-targets --no-default-features --features hive -- -D warnings"]

[execution]
cwd = "."
worktree = "auto"
worktree_root = "../codexctl-worktrees"
branch_template = "loop/{loop}/{source_item_id}"
session = "headless"
max_retries = 2
timeout_min = 90

[[verify]]
kind = "run"
command = "cargo clippy --all-targets -- -D warnings"

[[verify]]
kind = "run"
command = "cargo clippy --all-targets --no-default-features --features hive -- -D warnings"

[gates]
max_items_per_run = 1
max_concurrent = 1
require_human_for = ["destructive", "ambiguous", "security-sensitive"]
