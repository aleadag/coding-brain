name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure Cargo version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          test "$TAG" = "$VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked --git https://github.com/cross-rs/cross --branch main

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd target/${{ matrix.target }}/release
          tar czf ../../../codexctl-${TAG}-${{ matrix.target }}.tar.gz codexctl
          cd ../../..
          shasum -a 256 codexctl-${TAG}-${{ matrix.target }}.tar.gz > codexctl-${TAG}-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: codexctl-${{ matrix.target }}
          path: |
            codexctl-*.tar.gz
            codexctl-*.tar.gz.sha256

  publish-core:
    name: Publish codexctl-core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish codexctl-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/codexctl-core/Cargo.toml | head -n 1)
          FOUND=$(curl -sS -A "codexctl-release-workflow" "https://crates.io/api/v1/crates/codexctl-core/${VERSION}" | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            echo "codexctl-core ${VERSION} already published"
          else
            cargo publish -p codexctl-core --locked --token "$CARGO_REGISTRY_TOKEN"
          fi

  publish-tui:
    name: Publish codexctl-tui
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Wait for codexctl-core
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/codexctl-core/Cargo.toml | head -n 1)
          for i in $(seq 1 30); do
            FOUND=$(curl -sS -A "codexctl-release-workflow" "https://crates.io/api/v1/crates/codexctl-core/${VERSION}" | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
            [ -n "$FOUND" ] && exit 0
            echo "waiting for codexctl-core ${VERSION} (attempt ${i}/30)"
            sleep 10
          done
          exit 1
      - name: Publish codexctl-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/codexctl-tui/Cargo.toml | head -n 1)
          FOUND=$(curl -sS -A "codexctl-release-workflow" "https://crates.io/api/v1/crates/codexctl-tui/${VERSION}" | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            echo "codexctl-tui ${VERSION} already published"
          else
            cargo publish -p codexctl-tui --locked --token "$CARGO_REGISTRY_TOKEN"
          fi

  publish:
    name: Publish codexctl
    needs: publish-tui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Wait for codexctl-tui
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/codexctl-tui/Cargo.toml | head -n 1)
          for i in $(seq 1 30); do
            FOUND=$(curl -sS -A "codexctl-release-workflow" "https://crates.io/api/v1/crates/codexctl-tui/${VERSION}" | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
            [ -n "$FOUND" ] && exit 0
            echo "waiting for codexctl-tui ${VERSION} (attempt ${i}/30)"
            sleep 10
          done
          exit 1
      - name: Publish codexctl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  release:
    name: Create GitHub release
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/codexctl-*.tar.gz
            artifacts/codexctl-*.tar.gz.sha256

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: codexctl
      - uses: actions/checkout@v6
        with:
          repository: aleadag/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Render formula
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd codexctl
          ./scripts/render-homebrew-formula.sh "$VERSION" "$(awk '{print $1}' ../artifacts/codexctl-${TAG}-aarch64-apple-darwin.tar.gz.sha256)" "$(awk '{print $1}' ../artifacts/codexctl-${TAG}-x86_64-apple-darwin.tar.gz.sha256)" "$(awk '{print $1}' ../artifacts/codexctl-${TAG}-x86_64-unknown-linux-musl.tar.gz.sha256)" "$(awk '{print $1}' ../artifacts/codexctl-${TAG}-aarch64-unknown-linux-musl.tar.gz.sha256)" > ../homebrew-tap/Formula/codexctl.rb
      - name: Commit formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codexctl.rb
          git diff --cached --quiet && exit 0
          git commit -m "codexctl ${GITHUB_REF#refs/tags/v}"
          git push
